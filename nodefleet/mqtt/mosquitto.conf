# NodeFleet MQTT Broker Configuration
# Eclipse Mosquitto 2.x

# Network listeners
listener 1883
protocol mqtt

# WebSocket listener (for browser-based MQTT clients)
listener 9001
protocol websockets

# Authentication (allow anonymous for development; change for production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true

# Message size limits
message_size_limit 262144

# Keepalive
max_keepalive 120
