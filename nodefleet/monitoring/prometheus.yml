global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nodefleet-web'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['web:3000']

  - job_name: 'nodefleet-ws'
    static_configs:
      - targets: ['ws-server:8080']
