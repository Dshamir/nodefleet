services:
  postgres:
    image: postgres:16
    container_name: nodefleet-postgres
    restart: unless-stopped
    mem_limit: 4g
    cpus: '2.0'
    environment:
      POSTGRES_USER: nodefleet
      POSTGRES_PASSWORD: nodefleet
      POSTGRES_DB: nodefleet
    ports:
      - "50432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nodefleet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodefleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nodefleet-redis
    restart: unless-stopped
    mem_limit: 1g
    cpus: '0.5'
    ports:
      - "50379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nodefleet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nodefleet-minio
    restart: unless-stopped
    mem_limit: 2g
    cpus: '1.0'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "50900:9000"
      - "50901:9001"
    volumes:
      - minio_data:/minio_data
    networks:
      - nodefleet-net
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nodefleet-minio-init
    restart: on-failure:3
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - nodefleet-net
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/nodefleet-media --ignore-existing;
      exit 0;
      "

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: nodefleet-web
    restart: on-failure:5
    mem_limit: 2g
    cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "50300:3000"
    networks:
      - nodefleet-net
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTH_URL: https://nodefleet.ngrok.dev
      AUTH_TRUST_HOST: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: nodefleet-ws
    restart: on-failure:5
    mem_limit: 2g
    cpus: '1.0'
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "50081:8080"
      - "50555:5555/udp"
    networks:
      - nodefleet-net
    environment:
      PORT: 8080
      WS_PORT: 8080
      UDP_DISCOVERY_PORT: 5555
      HTTP_PORT: 50080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENABLE_DISCOVERY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nodefleet-nginx
    restart: on-failure:5
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      - web
      - ws-server
    ports:
      - "50080:80"
      - "50443:443"
      - "50301:50301"
    networks:
      - nodefleet-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mqtt:
    image: eclipse-mosquitto:2
    container_name: nodefleet-mqtt
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    ports:
      - "51883:1883"
      - "59001:9001"
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - nodefleet-net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  ngrok:
    image: ngrok/ngrok:latest
    container_name: nodefleet-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http nginx:80 --url=nodefleet.ngrok.dev
    ports:
      - "50040:4040"
    depends_on:
      - nginx
    networks:
      - nodefleet-net

  prometheus:
    image: prom/prometheus:latest
    container_name: nodefleet-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "50090:9090"
    networks:
      - nodefleet-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: nodefleet-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nodefleet
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "50030:3000"
    depends_on:
      - prometheus
    networks:
      - nodefleet-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: nodefleet-node-exporter
    restart: unless-stopped
    networks:
      - nodefleet-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: nodefleet-mailhog
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.25'
    ports:
      - "50025:1025"    # SMTP
      - "50826:8025"    # Web UI
    networks:
      - nodefleet-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mqtt_data:
  mqtt_log:
  prometheus_data:
  grafana_data:

networks:
  nodefleet-net:
    driver: bridge
