# Zenzers 4Life — Unified Docker Compose
# Medical platform with admin console, Keycloak SSO, and supporting services
#
# Usage:
#   docker compose up -d
#   docker compose up --build admin-backend admin-console

services:
  # ── Identity Provider ──────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: https://zenzer.ngrok.dev/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "48080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | head -1 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Object Storage ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zenzers_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "49000:9000"
      - "49001:9001"
    volumes:
      - miniodata:/data
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ── Databases ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keycloak
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgresql/init-app-db.sql:/docker-entrypoint-initdb.d/20-init-app-db.sql:ro
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zenzers-net
    restart: unless-stopped

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodata:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "47017:27017"
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "46379:6379"
    volumes:
      - redisdata:/data
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "45672:5672"
      - "45673:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Admin Backend (Express.js) ─────────────────────────────────────────
  admin-backend:
    build:
      context: ./zenzers-admin-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb/mediastore?authSource=admin
      PRISMA_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/zenzers?schema=app
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq/
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AUTH_URL: http://keycloak:8080/auth/realms/zenzers
      AUTH_ISSUER: https://zenzer.ngrok.dev/auth/realms/zenzers
      ADMIN_AUTH_URL: http://keycloak:8080/auth/admin/realms/zenzers
      AUTH_CLIENT_ID: admin-console-client
      AUTH_CLIENT_ID_BACKEND: admin-backend-service
      AUTH_CLIENT_SECRET_BACKEND: ${AUTH_CLIENT_SECRET_BACKEND}
      INTERNAL_SERVICES_PASSKEY: ${INTERNAL_SERVICES_PASSKEY}
      EMAILS_FROM: "Zenzers 4Life <noreply@zenzers4life.com>"
      EMAILS_SMTP_SERVER: ${EMAILS_SMTP_SERVER:-smtp.ethereal.email}
      EMAILS_SMTP_PORT: ${EMAILS_SMTP_PORT:-587}
      EMAILS_SMTP_USER: ${EMAILS_SMTP_USER:-}
      EMAILS_SMTP_PASSWORD: ${EMAILS_SMTP_PASSWORD:-}
      APP_URL: http://localhost
      API_URL: http://localhost:3001
      SWAGGER_USERNAME: admin
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      MEDICAL_API_URL: http://medical-api:3002
      DEMO_JWT_SECRET: ${DEMO_JWT_SECRET:-zenzers-dev-jwt-secret-change-me}
      # Backup credentials (used by mongodump / pg_dump)
      MONGO_BACKUP_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_BACKUP_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      PG_BACKUP_USER: ${POSTGRES_USER}
      PG_BACKUP_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "43001:3001"
    depends_on:
      - mongodb
      - postgres
      - redis
      - rabbitmq
      - keycloak
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Medical API (NestJS) ───────────────────────────────────────────────
  medical-api:
    build:
      context: ./alevelsoft-med-api-7a105a6bf042/alevelsoft-med-api-7a105a6bf042
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      SERVER_PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: medical_db
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_ISSUER_URL: https://zenzer.ngrok.dev/auth
      KEYCLOAK_REALM: zenzers
      KEYCLOAK_CLIENT_ID: medical-app-client
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      SMTP_HOST: ${EMAILS_SMTP_SERVER:-smtp.ethereal.email}
      SMTP_PORT: ${EMAILS_SMTP_PORT:-587}
      SMTP_USER: ${EMAILS_SMTP_USER:-}
      SMTP_PASS: ${EMAILS_SMTP_PASSWORD:-}
      MAIL_FROM_EMAIL: noreply@zenzers4life.com
      MAIL_FROM_NAME: "Zenzers 4Life"
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:40080}
      INTERNAL_SERVICES_PASSKEY: ${INTERNAL_SERVICES_PASSKEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-zenzers_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: medical-avatars
      MINIO_PUBLIC_URL: http://localhost:49000/medical-avatars/avatars/
    ports:
      - "43002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Admin Console (React 19 + Vite) ───────────────────────────────────
  admin-console:
    build:
      context: ./zenzers-admin-console
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_KEYCLOAK_URL: https://zenzer.ngrok.dev/auth
        VITE_KEYCLOAK_REALM: zenzers
        VITE_KEYCLOAK_CLIENT_ID: admin-console-client
    environment:
      VITE_API_URL: /api
      VITE_KEYCLOAK_URL: https://zenzer.ngrok.dev/auth
      VITE_KEYCLOAK_REALM: zenzers
      VITE_KEYCLOAK_CLIENT_ID: admin-console-client
    ports:
      - "43100:3000"
    depends_on:
      - admin-backend
    networks:
      - zenzers-net
    restart: unless-stopped

  # ── Medical Web (React 18 + Vite) ─────────────────────────────────────
  medical-web:
    build:
      context: ./alevelsoft-med-web-0e99899af2eb/alevelsoft-med-web-0e99899af2eb
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /med-api
        VITE_KEYCLOAK_URL: /auth
        VITE_KEYCLOAK_REALM: zenzers
        VITE_KEYCLOAK_CLIENT_ID: medical-app-client
    ports:
      - "43200:80"
    depends_on:
      - medical-api
    networks:
      - zenzers-net
    restart: unless-stopped

  # ── Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "40080:80"
      - "40443:443"
    depends_on:
      - admin-console
      - admin-backend
      - medical-web
      - medical-api
      - keycloak
    networks:
      - zenzers-net
    restart: unless-stopped

  # ── Device & Gateway Emulators ────────────────────────────────────────
  zenzer-device-emulator:
    build:
      context: ./packages/zenzer-device-emulator
    environment:
      DEVICE_COUNT: ${EMULATOR_DEVICE_COUNT:-5}
      WS_PORT: 8765
      READING_INTERVAL_MS: ${EMULATOR_READING_INTERVAL:-5000}
    ports:
      - "48765:8765"
    networks:
      - zenzers-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8765/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rpi-gateway-emulator:
    build:
      context: ./packages/rpi-gateway-emulator
    environment:
      DEVICE_EMULATOR_URL: ws://zenzer-device-emulator:8765
      MEDICAL_API_URL: http://medical-api:3002
      ADMIN_BACKEND_URL: http://admin-backend:3001
      INTERNAL_PASSKEY: ${INTERNAL_SERVICES_PASSKEY}
      GATEWAY_EMAIL: gateway@zenzers-emulator.local
      GATEWAY_PASSWORD: GatewayEmul8!
      PATIENT_COUNT: ${EMULATOR_DEVICE_COUNT:-5}
      SUBMIT_INTERVAL_MS: 10000
      HEARTBEAT_INTERVAL_MS: 60000
      SENIOR_HOME_NAME: "Emulated Senior Residence"
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb/mediastore?authSource=admin
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      zenzer-device-emulator:
        condition: service_healthy
      medical-api:
        condition: service_started
      mongodb:
        condition: service_healthy
    networks:
      - zenzers-net
    restart: unless-stopped

  # ── ngrok Tunnel ─────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    command: http nginx:80 --url=zenzer.ngrok.dev
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "44040:4040"
    depends_on:
      - nginx
    networks:
      - zenzers-net
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
  redisdata:
  rabbitmqdata:
  miniodata:

networks:
  zenzers-net:
    driver: bridge
