events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    proxy_set_header    Host $host;
    proxy_set_header    X-Real-IP $remote_addr;
    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Host $server_name;

    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;
    client_max_body_size        200M;

    resolver 127.0.0.11 valid=5s;

    # ── Main: zenzers4life.com (or localhost) ────────────────────────────
    server {
        server_name zenzers4life.com localhost zenzer.ngrok.dev;
        listen 80;

        set $keycloak "keycloak";
        set $admin_backend "admin-backend";
        set $admin_console "admin-console";
        set $medical_web "medical-web";
        set $medical_api "medical-api";

        # OIDC callback — must reach the React SPA, not Keycloak
        location = /auth/callback {
            proxy_pass  http://$medical_web:80;
        }

        # Keycloak SSO (KC_HTTP_RELATIVE_PATH=/auth)
        location /auth/ {
            proxy_pass  http://$keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/ {
            proxy_pass  http://$admin_backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Medical API (NestJS)
        location /med-api/ {
            rewrite ^/med-api/(.*) /$1 break;
            proxy_pass  http://$medical_api:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Admin Console UI
        location /admin/ {
            proxy_pass  http://$admin_console:3000;
        }

        # Medical Web (default)
        location / {
            proxy_pass  http://$medical_web:80;
        }
    }

    # ── API subdomain: api.zenzers4life.com ──────────────────────────────
    server {
        server_name api.zenzers4life.com;
        listen 80;

        set $medical_api "medical-api";

        location / {
            proxy_pass  http://$medical_api:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
